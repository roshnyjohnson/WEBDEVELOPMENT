<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border:2px solid black;
            padding: 20px;
            box-shadow: 50px 10px 5px grey;
            outline: 2px solid red;
            border:2px dashed blue;
        }
        .text-element{
            font-size: 20px;
            color: red;
            text-shadow: 5px 5px 2px grey;
        }
    </style>
</head>
<body>
    <div class="box">
        i am a box
    </div>
    <p class="text-element">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolores, autem modi ducimus porro necessitatibus enim tempore quia laudantium beatae dolore maiores nisi, perspiciatis ratione inventore iure tempora et error. Vitae, minima nisi!
    </p>
    
</body>
</html>
