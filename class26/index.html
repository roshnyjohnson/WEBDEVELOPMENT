<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css positions</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        .parent{
            border:5px solid purple;
            padding:5px;
            position:sticky;
        }
        .box {
            border:1px solid black;
            height:500px;
            width:80vw;
            margin:10px;
            padding:10px;
        }
        .box1{
            background-color:green;
            position:absolute;
            /* position:sticky; */
            top:0px;
            /* right:100px; */
        }
        .box2{
            background-color:hotpink;
            position:fixed;
            bottom:20px;
            left:20px;
        }
        .box3{
            background-color:yellow;
            
        }
        .box4{
            background-color:blue;
            /* position:relative;
            top:-50px;
            left:100px;
            z-index:-1; */
        }
        
    </style>
</head>
<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
    
</body>
</html>
