<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMS-LETS LEARN</title>
</head>
<body>
    <h1>FORM FOR TEACHING STAFF</h1>
    <form action="post">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name">
        </div>

        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
        </div>

        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>

        </div>
        <div>
            <input type="checkbox" name="subscribe" id="subscribe" value="yes">
            <label for="subscribe">Say ok to newsletter</label>
        </div>
        <div>
            <label for="comment">Enter your comment</label>
            <br>
            <textarea name="comment" id="comment" rows="10" cols="50">
                Enter your comment here...
            </textarea>
        </div>
        <div>
            <select name="profession" id="profession" row="50" column="20">
                <option value="teacher">Teacher</option>
                <option value="student">Student</option>
                <option value="other">Other</option>
        </div>


    </form>
    
</body>
</html>
