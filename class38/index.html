    <title>FLEXBOX</title>

        .container{

            justify-content: center;
            align-items: center;

        }
        .item{

            /* margin: 5px; */

        }

            background-color: green;
        }
        .order-2{
            order: 2;       
        }
        .order-3{
            order: 3;       
        }

    </style>
</head>

</html>
