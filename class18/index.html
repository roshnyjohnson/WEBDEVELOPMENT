<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX ELEMENTS</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            background-color: blue;
        }
        .box1{
            color:red;
            margin:10px;
            border: 2px solid black;
            padding: 5px;
            height: 200px;
            box-sizing:border-box;
        }
        .box2{
            color:aliceblue;
            margin:10px;
            border: 2px solid black;
            padding: 5px;
            height: 200px;
            box-sizing:border-box;
        }
    </style>
</head>
<body>
    <div class="box box1">I AM A BOX</div>
    <div class="box box2">I AM Another BOX</div>
</body>
</html>
