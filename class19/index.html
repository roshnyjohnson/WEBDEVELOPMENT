<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FONTS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Cedarville+Cursive&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        p{
        font-family: "Baloo 2", cursive;
        font-size: 15px;
        font-weight:bold;
        font-style:italic;
        line-height: 2;
        letter-spacing: 5px;
        }
        h1{
        font-family: "Cedarville Cursive", cursive;
        font-weight: 400;
        font-style: normal;
        text-align: center;
        }
        h2{
            text-transform: uppercase;
            text-decoration: underline;
            text-decoration-color: red;
            text-decoration-style: dotted;
        }
        h3{
            text-transform: capitalize;
        }
        .lorem{
            border:3px solid red;
            width:100px;
            word-break:break-all;
        }

    </style>
</head>
<body>
    <h1>HEADING</h1>
    <h2>heading is mandatory</h2>
    <h3>heading is mandatory</h3>
    <p class="lorem">
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Veritatis, pariatur!
    </p>    
</body>
</html>
