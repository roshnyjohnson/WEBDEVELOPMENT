<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS DISPLAY PROPERTY</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        .box{
            border:2px solid black;
            display:inline-block;
            /* do it inline then no padding and margin on top */
            padding:45px;
            margin:45px;
        }
        .box1{
            /* display:none; */
            visibility:hidden;
        }
    </style>
</head>
<body>
    <div class="box box1">
        i am a box
    </div>
    <div class="box">
        also a nice box
    </div>
    <div>
        dcvnav
    </div>
    g
</body>
</html>
